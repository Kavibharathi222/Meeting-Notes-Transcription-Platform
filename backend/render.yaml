services:
  - type: web
    name: fireflies-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: fireflies-db
          property: connectionString

databases:
  - name: fireflies-db
    databaseName: fireflies
    user: fireflies_user
    plan: free
